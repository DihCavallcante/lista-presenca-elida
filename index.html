<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Presença - ADB Vila Élida 2025</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Menu</h2>
    <button onclick="mostrarPagina('registro')">📝 Registrar Presença</button>
    <button onclick="mostrarPagina('lista')">📋 Lista de Presença</button>
    <button onclick="mostrarPagina('config')">⚙️ Configurações</button>
    <div class="relogio" id="relogio"></div>
  </aside>

  <!-- Main -->
  <main>
    <!-- Logo da Igreja -->
    <div class="logo-igreja">
      <img src="https://i.ibb.co/yF9CY2tV/327185183-739228714063067-4074704671844114300-n.jpg" alt="Logo Igreja">
    </div>

    <!-- Registro -->
    <section id="registro" class="pagina ativa">
      <h1>Registrar Presença</h1>
      <form id="formPresenca">
        <label>Nome:</label>
        <input type="text" id="nome" required>

        <label>Acompanhante:</label>
        <input type="text" id="acompanhante">

        <label>Vínculo:</label>
        <div class="vinculo-container">
          <select id="vinculo" required>
            <option value="">Selecione o vínculo</option>
            <option value="Congregação (bairro)">Congregação (bairro)</option>
            <option value="Outra religião">Outra religião</option>
            <option value="Sem igreja">Sem igreja</option>
          </select>
          <input type="text" id="vinculoExtra" placeholder="Detalhes">
        </div>

        <label>Tipo:</label>
        <select id="tipo" required>
          <option value="Convidado">Convidado</option>
          <option value="Visitante">Visitante</option>
          <option value="Membro">Membro</option>
        </select>

        <button type="submit">Registrar</button>
      </form>
    </section>

    <!-- Lista -->
    <section id="lista" class="pagina">
      <h1>Lista de Presença</h1>
      <div class="filtros">
        <label>Filtrar por data:</label>
        <input type="date" id="filtroData">
        <label>Mês:</label>
        <input type="month" id="filtroMes">
        <label>Ano:</label>
        <input type="number" id="filtroAno" placeholder="2025">
        <button onclick="aplicarFiltros()">🔎 Filtrar</button>
        <button onclick="limparFiltros()">❌ Limpar</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Acompanhante</th>
            <th>Vínculo</th>
            <th>Detalhes</th>
            <th>Tipo</th>
            <th>Data</th>
            <th>Hora</th>
          </tr>
        </thead>
        <tbody id="tabelaPresencas"></tbody>
      </table>
      <p id="contador"></p>
    </section>

    <!-- Configurações -->
    <aside id="config" class="pagina">
      <h1>⚙️ Configurações</h1>
      <label>Fonte:</label>
      <select id="fontSelect">
        <option value="Arial">Arial</option>
        <option value="Verdana">Verdana</option>
        <option value="Tahoma">Tahoma</option>
        <option value="Georgia">Georgia</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
        <option value="Lucida Sans">Lucida Sans</option>
        <option value="Trebuchet MS">Trebuchet MS</option>
        <option value="Impact">Impact</option>
        <option value="Comic Sans MS">Comic Sans MS</option>
      </select>
    </aside>
  </main>

  <!-- Footer -->
  <footer>
    <p>ADB Vila Élida 2025</p>
    <div class="logos-rodape">
      <a href="#"><img src="https://i.ibb.co/wZzfjyfC/Logo-UM-com-Chama-Distintiva.png" alt="Logo 1"></a>
      <a href="#"><img src="https://i.ibb.co/Fk8bSK2c/Chat-GPT-Image-1-de-out-de-2025-01-08-36.png" alt="Logo 2"></a>
      <a href="#"><img src="https://i.ibb.co/3ymx6qFf/Logo-Elegante-com-Diamante-Geom-trico.png" alt="Logo 3"></a>
      <a href="#"><img src="https://i.ibb.co/bMRm7y23/Logotipo-ADB-28-Kids-Vila-lida.png" alt="Logo 4"></a>
    </div>
  </footer>

  <!-- Script JS -->
  <script type="module" src="script.js"></script>
</body>
</html>
