<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ADB Vila Élida — Presença</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Fundo -->
  <div class="bg"></div>

  <!-- Card central -->
  <div class="wrap">
    <div class="card">

      <!-- Logo / título -->
      <div class="card-top">
        <img class="logo" src="https://i.ibb.co/yF9CY2tV/327185183-739228714063067-4074704671844114300-n.jpg" alt="ADB Vila Élida">
        <h1 id="headline">Conecte-se</h1>
      </div>

      <!-- === AREA AUTH: Login / Cadastro === -->
      <div id="auth-area">
        <form id="auth-form" class="form">
          <input id="email" type="email" placeholder="E-mail" required autocomplete="username"/>
          <input id="password" type="password" placeholder="Senha" required autocomplete="current-password"/>
          <button id="submit-btn" class="btn primary">Entrar</button>
        </form>

        <p class="small" id="auth-switch">
          <span id="auth-msg">Não possui conta?</span>
          <a href="#" id="switch-link">Cadastre-se</a>
        </p>
        <p id="auth-feedback" class="feedback"></p>
      </div>

      <!-- === AREA PRESENCA === -->
      <div id="presenca-area" class="hidden">
        <div class="toolbar">
          <div class="left">
            <button class="btn ghost" id="btn-registra" onclick="mostrarPagina('registro')">📝 Registrar Presença</button>
            <button class="btn ghost" onclick="mostrarPagina('lista')">📋 Lista</button>
          </div>
          <div class="right">
            <span id="user-email" class="small muted"></span>
            <button class="btn ghost" id="logout-btn">Sair</button>
          </div>
        </div>

        <main class="presenca-main">
          <!-- Registro -->
          <section id="registro" class="pagina ativa">
            <h2>Registrar Presença</h2>
            <form id="formPresenca" class="form">
              <input id="nome" placeholder="Nome" required />
              <input id="acompanhante" placeholder="Acompanhante (opcional)" />
              <div class="row">
                <select id="vinculo" required>
                  <option value="">Selecione o vínculo</option>
                  <option>Congregação</option>
                  <option>Outra religião</option>
                  <option>Sem igreja</option>
                </select>
                <input id="vinculoExtra" placeholder="Detalhes" />
              </div>
              <select id="tipo" required>
                <option>Convidado</option>
                <option>Visitante</option>
                <option>Membro</option>
              </select>
              <button type="submit" class="btn primary">Salvar Presença</button>
            </form>
          </section>

          <!-- Lista -->
          <section id="lista" class="pagina">
            <h2>Lista de Presença</h2>
            <div class="filtros">
              <input id="filtroData" type="date"/>
              <input id="filtroMes" type="month"/>
              <input id="filtroAno" type="number" placeholder="2025"/>
              <button class="btn" id="btnFiltrar">Filtrar</button>
              <button class="btn ghost" id="btnLimpar">Limpar</button>
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr><th>Nome</th><th>Acompanhante</th><th>Vínculo</th><th>Detalhes</th><th>Tipo</th><th>Data</th><th>Hora</th></tr>
                </thead>
                <tbody id="tabelaPresencas"></tbody>
              </table>
            </div>
            <p id="contador" class="muted"></p>
          </section>
        </main>
      </div>

    </div>
  </div>

   <!-- Footer -->
  <footer>
    <p>ADB Vila Élida 2025</p>
    <div class="logos-rodape">
      <a href="#"><img src="https://i.ibb.co/wZzfjyfC/Logo-UM-com-Chama-Distintiva.png" alt="Logo 1"></a>
      <a href="#"><img src="https://i.ibb.co/Fk8bSK2c/Chat-GPT-Image-1-de-out-de-2025-01-08-36.png" alt="Logo 2"></a>
      <a href="#"><img src="https://i.ibb.co/3ymx6qFf/Logo-Elegante-com-Diamante-Geom-trico.png" alt="Logo 3"></a>
      <a href="#"><img src="https://i.ibb.co/bMRm7y23/Logotipo-ADB-28-Kids-Vila-lida.png" alt="Logo 4"></a>
    </div>
  </footer>

  <!-- Firebase + App JS -->
  <script type="module" src="script.js"></script>
</body>
</html>
